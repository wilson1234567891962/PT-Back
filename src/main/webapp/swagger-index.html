<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Task Manager API - Swagger UI</title>
    <link rel="stylesheet" type="text/css" href="/task-api/webjars/swagger-ui/5.10.3/swagger-ui.css?v=1">
    <link rel="icon" type="image/png" href="/task-api/webjars/swagger-ui/5.10.3/favicon-32x32.png?v=1" sizes="32x32">
    <link rel="icon" type="image/png" href="/task-api/webjars/swagger-ui/5.10.3/favicon-16x16.png?v=1" sizes="16x16">
    <style>
        html {
            box-sizing: border-box;
            overflow: -moz-scrollbars-vertical;
            overflow-y: scroll;
        }
        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }
        body {
            margin: 0;
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="/task-api/webjars/swagger-ui/5.10.3/swagger-ui-bundle.js?v=1"></script>
    <script src="/task-api/webjars/swagger-ui/5.10.3/swagger-ui-standalone-preset.js?v=1"></script>
    <script>
        window.onload = function() {
            const ui = SwaggerUIBundle({
                spec: {
                    "openapi": "3.0.0",
                    "info": {
                        "title": "Task Manager API - Arquitectura Hexagonal",
                        "version": "2.0.0",
                        "description": "API REST para gestión de tareas con arquitectura hexagonal (puertos y adaptadores)",
                        "contact": {
                            "name": "Task Manager Team",
                            "email": "support@taskmanager.com"
                        },
                        "license": {
                            "name": "MIT License",
                            "url": "https://opensource.org/licenses/MIT"
                        }
                    },
                    "servers": [
                        {
                            "description": "Docker (PostgreSQL) - Hexagonal",
                            "url": "http://localhost:8080/task-api/api"
                        },
                        {
                            "description": "Jetty Local - Hexagonal",
                            "url": "http://localhost:8082/task-api/api"
                        }
                    ],
                    "paths": {
                        "/tasks": {
                            "get": {
                                "summary": "Obtener todas las tareas",
                                "responses": {
                                    "200": {
                                        "description": "Lista de tareas obtenida exitosamente",
                                        "content": {
                                            "application/json": {
                                                "schema": {
                                                    "type": "array",
                                                    "items": {
                                                        "$ref": "#/components/schemas/Task"
                                                    }
                                                }
                                            }
                                        }
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            },
                            "post": {
                                "summary": "Crear una nueva tarea",
                                "requestBody": {
                                    "required": true,
                                    "content": {
                                        "application/json": {
                                            "schema": {
                                                "$ref": "#/components/schemas/Task"
                                            },
                                            "examples": {
                                                "exampleTask": {
                                                    "value": {
                                                        "title": "Nueva tarea",
                                                        "description": "Descripción de la tarea",
                                                        "completed": false
                                                    }
                                                }
                                            }
                                        }
                                    }
                                },
                                "responses": {
                                    "201": {
                                        "description": "Tarea creada exitosamente",
                                        "content": {
                                            "application/json": {
                                                "schema": {
                                                    "$ref": "#/components/schemas/Task"
                                                }
                                            }
                                        }
                                    },
                                    "400": {
                                        "description": "Solicitud inválida"
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            }
                        },
                        "/tasks/{id}": {
                            "get": {
                                "summary": "Obtener una tarea por ID",
                                "parameters": [
                                    {
                                        "name": "id",
                                        "in": "path",
                                        "required": true,
                                        "schema": {
                                            "type": "integer"
                                        }
                                    }
                                ],
                                "responses": {
                                    "200": {
                                        "description": "Tarea obtenida exitosamente",
                                        "content": {
                                            "application/json": {
                                                "schema": {
                                                    "$ref": "#/components/schemas/Task"
                                                }
                                            }
                                        }
                                    },
                                    "404": {
                                        "description": "Tarea no encontrada"
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            },
                            "put": {
                                "summary": "Actualizar una tarea",
                                "parameters": [
                                    {
                                        "name": "id",
                                        "in": "path",
                                        "required": true,
                                        "schema": {
                                            "type": "integer"
                                        }
                                    }
                                ],
                                "requestBody": {
                                    "required": true,
                                    "content": {
                                        "application/json": {
                                            "schema": {
                                                "$ref": "#/components/schemas/Task"
                                            },
                                            "examples": {
                                                "exampleTask": {
                                                    "value": {
                                                        "title": "Tarea actualizada",
                                                        "description": "Descripción actualizada",
                                                        "completed": true
                                                    }
                                                }
                                            }
                                        }
                                    }
                                },
                                "responses": {
                                    "200": {
                                        "description": "Tarea actualizada exitosamente",
                                        "content": {
                                            "application/json": {
                                                "schema": {
                                                    "$ref": "#/components/schemas/Task"
                                                }
                                            }
                                        }
                                    },
                                    "404": {
                                        "description": "Tarea no encontrada"
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            },
                            "delete": {
                                "summary": "Eliminar una tarea",
                                "parameters": [
                                    {
                                        "name": "id",
                                        "in": "path",
                                        "required": true,
                                        "schema": {
                                            "type": "integer"
                                        }
                                    }
                                ],
                                "responses": {
                                    "200": {
                                        "description": "Tarea eliminada exitosamente"
                                    },
                                    "404": {
                                        "description": "Tarea no encontrada"
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            }
                        },
                        "/tasks/test": {
                            "get": {
                                "summary": "Probar el servicio hexagonal",
                                "responses": {
                                    "200": {
                                        "description": "Servicio hexagonal probado exitosamente"
                                    }
                                }
                            }
                        },
                        "/tasks/{id}/complete": {
                            "post": {
                                "summary": "Marcar tarea como completada",
                                "parameters": [
                                    {
                                        "name": "id",
                                        "in": "path",
                                        "required": true,
                                        "schema": {
                                            "type": "integer"
                                        }
                                    }
                                ],
                                "responses": {
                                    "200": {
                                        "description": "Tarea marcada como completada exitosamente",
                                        "content": {
                                            "application/json": {
                                                "schema": {
                                                    "$ref": "#/components/schemas/Task"
                                                }
                                            }
                                        }
                                    },
                                    "404": {
                                        "description": "Tarea no encontrada"
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            }
                        },
                        "/tasks/{id}/pending": {
                            "post": {
                                "summary": "Marcar tarea como pendiente",
                                "parameters": [
                                    {
                                        "name": "id",
                                        "in": "path",
                                        "required": true,
                                        "schema": {
                                            "type": "integer"
                                        }
                                    }
                                ],
                                "responses": {
                                    "200": {
                                        "description": "Tarea marcada como pendiente exitosamente",
                                        "content": {
                                            "application/json": {
                                                "schema": {
                                                    "$ref": "#/components/schemas/Task"
                                                }
                                            }
                                        }
                                    },
                                    "404": {
                                        "description": "Tarea no encontrada"
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            }
                        },
                        "/tasks/completed": {
                            "get": {
                                "summary": "Obtener tareas completadas",
                                "responses": {
                                    "200": {
                                        "description": "Lista de tareas completadas obtenida exitosamente",
                                        "content": {
                                            "application/json": {
                                                "schema": {
                                                    "type": "array",
                                                    "items": {
                                                        "$ref": "#/components/schemas/Task"
                                                    }
                                                }
                                            }
                                        }
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            }
                        },
                        "/tasks/pending": {
                            "get": {
                                "summary": "Obtener tareas pendientes",
                                "responses": {
                                    "200": {
                                        "description": "Lista de tareas pendientes obtenida exitosamente",
                                        "content": {
                                            "application/json": {
                                                "schema": {
                                                    "type": "array",
                                                    "items": {
                                                        "$ref": "#/components/schemas/Task"
                                                    }
                                                }
                                            }
                                        }
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            }
                        },
                        "/tasks/search": {
                            "get": {
                                "summary": "Buscar tareas por título",
                                "parameters": [
                                    {
                                        "name": "q",
                                        "in": "query",
                                        "required": true,
                                        "schema": {
                                            "type": "string"
                                        },
                                        "description": "Texto a buscar en el título"
                                    }
                                ],
                                "responses": {
                                    "200": {
                                        "description": "Lista de tareas encontradas exitosamente",
                                        "content": {
                                            "application/json": {
                                                "schema": {
                                                    "type": "array",
                                                    "items": {
                                                        "$ref": "#/components/schemas/Task"
                                                    }
                                                }
                                            }
                                        }
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            }
                        }
                    },
                    "components": {
                        "schemas": {
                            "Task": {
                                "type": "object",
                                "properties": {
                                    "taskId": {
                                        "type": "integer",
                                        "format": "int64",
                                        "description": "ID único de la tarea",
                                        "readOnly": true
                                    },
                                    "title": {
                                        "type": "string",
                                        "description": "Título de la tarea",
                                        "minLength": 1,
                                        "maxLength": 100
                                    },
                                    "description": {
                                        "type": "string",
                                        "description": "Descripción detallada de la tarea",
                                        "maxLength": 4000
                                    },
                                    "completed": {
                                        "type": "boolean",
                                        "description": "Estado de completado de la tarea",
                                        "default": false
                                    },
                                    "createdAt": {
                                        "type": "string",
                                        "format": "date-time",
                                        "description": "Fecha y hora de creación",
                                        "readOnly": true
                                    },
                                    "updatedAt": {
                                        "type": "string",
                                        "format": "date-time",
                                        "description": "Fecha y hora de última actualización",
                                        "readOnly": true
                                    }
                                },
                                "required": ["title"],
                                "example": {
                                    "taskId": 1,
                                    "title": "Tarea de ejemplo",
                                    "description": "Descripción de ejemplo",
                                    "completed": false,
                                    "createdAt": "2024-01-01T12:00:00Z",
                                    "updatedAt": "2024-01-01T12:00:00Z"
                                }
                            }
                        }
                    }
                },
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                // Deshabilitar la carga automática de URL
                url: "",
                urls: null
            });
            window.ui = ui;
        };
    </script>
</body>
</html>
