<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Task Manager API - Swagger UI</title>
    <link rel="stylesheet" type="text/css" href="/task-api/webjars/swagger-ui/5.10.3/swagger-ui.css?v=1">
    <link rel="icon" type="image/png" href="/task-api/webjars/swagger-ui/5.10.3/favicon-32x32.png?v=1" sizes="32x32">
    <link rel="icon" type="image/png" href="/task-api/webjars/swagger-ui/5.10.3/favicon-16x16.png?v=1" sizes="16x16">
    <style>
        html {
            box-sizing: border-box;
            overflow: -moz-scrollbars-vertical;
            overflow-y: scroll;
        }
        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }
        body {
            margin: 0;
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="/task-api/webjars/swagger-ui/5.10.3/swagger-ui-bundle.js?v=1"></script>
    <script src="/task-api/webjars/swagger-ui/5.10.3/swagger-ui-standalone-preset.js?v=1"></script>
    <script>
        window.onload = function() {
            const ui = SwaggerUIBundle({
                spec: {
                    "openapi": "3.0.0",
                    "info": {
                        "title": "Task Manager API",
                        "version": "1.0.0",
                        "description": "API REST para gestión de tareas con Oracle PL/SQL y Java",
                        "contact": {
                            "name": "Task Manager Team",
                            "email": "support@taskmanager.com"
                        },
                        "license": {
                            "name": "MIT License",
                            "url": "https://opensource.org/licenses/MIT"
                        }
                    },
                    "servers": [
                        {
                            "description": "Servidor de desarrollo",
                            "url": "http://localhost:8082/task-api/api"
                        }
                    ],
                    "paths": {
                        "/tasks": {
                            "get": {
                                "summary": "Obtener todas las tareas",
                                "responses": {
                                    "200": {
                                        "description": "Lista de tareas obtenida exitosamente"
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            },
                            "post": {
                                "summary": "Crear una nueva tarea",
                                "responses": {
                                    "201": {
                                        "description": "Tarea creada exitosamente"
                                    },
                                    "400": {
                                        "description": "Solicitud inválida"
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            }
                        },
                        "/tasks/{id}": {
                            "get": {
                                "summary": "Obtener una tarea por ID",
                                "parameters": [
                                    {
                                        "name": "id",
                                        "in": "path",
                                        "required": true,
                                        "schema": {
                                            "type": "integer"
                                        }
                                    }
                                ],
                                "responses": {
                                    "200": {
                                        "description": "Tarea obtenida exitosamente"
                                    },
                                    "404": {
                                        "description": "Tarea no encontrada"
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            },
                            "put": {
                                "summary": "Actualizar una tarea",
                                "parameters": [
                                    {
                                        "name": "id",
                                        "in": "path",
                                        "required": true,
                                        "schema": {
                                            "type": "integer"
                                        }
                                    }
                                ],
                                "responses": {
                                    "200": {
                                        "description": "Tarea actualizada exitosamente"
                                    },
                                    "404": {
                                        "description": "Tarea no encontrada"
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            },
                            "delete": {
                                "summary": "Eliminar una tarea",
                                "parameters": [
                                    {
                                        "name": "id",
                                        "in": "path",
                                        "required": true,
                                        "schema": {
                                            "type": "integer"
                                        }
                                    }
                                ],
                                "responses": {
                                    "200": {
                                        "description": "Tarea eliminada exitosamente"
                                    },
                                    "404": {
                                        "description": "Tarea no encontrada"
                                    },
                                    "500": {
                                        "description": "Error interno del servidor"
                                    }
                                }
                            }
                        },
                        "/tasks/test": {
                            "get": {
                                "summary": "Probar el servicio",
                                "responses": {
                                    "200": {
                                        "description": "Servicio probado exitosamente"
                                    }
                                }
                            }
                        }
                    }
                },
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                // Deshabilitar la carga automática de URL
                url: "",
                urls: null
            });
            window.ui = ui;
        };
    </script>
</body>
</html>
